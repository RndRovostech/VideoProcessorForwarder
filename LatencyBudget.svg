<rect x="816.5" y="40" width="96.7" height="42" fill="#3F4668"/>
<text x="864.9" y="66" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">13 ms</text>
<rect x="913.2" y="40" width="28.9" height="42" fill="#5C6178"/>
<rect x="942.1" y="40" width="7.2" height="42" fill="#8A90A8"/>
<rect x="949.3" y="40" width="0.7" height="42" fill="#9AA0C4"/>
<rect x="30" y="40" width="920" height="42" fill="none" stroke="#DDDEE4"/>
<rect x="30" y="98" width="11" height="11" rx="2" fill="#22263A"/>
