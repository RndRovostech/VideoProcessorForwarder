<text x="30" y="26" font-size="13" font-weight="700" fill="#22263A">Camera frame → RTP packet on the wire</text>
<text x="950" y="26" font-size="13" font-weight="700" fill="#22263A" text-anchor="end">127.5 ms total</text>
<rect x="30.0" y="40" width="786.5" height="42" fill="#22263A"/>
