<rect x="30" y="168" width="920" height="30" rx="5" fill="#F7F7F9" stroke="#DDDEE4"/>
<text x="46" y="188" font-size="11.5" fill="#22263A"><tspan font-weight="700">Ingest dominates</tspan> — mostly the inherent cost of receiving and decoding compressed video. It was 611 ms before this work.</text>
