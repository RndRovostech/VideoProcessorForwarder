<rect x="30" y="122" width="11" height="11" rx="2" fill="#3F4668"/>
<text x="48" y="132" font-size="11.5" fill="#22263A">Pacer hold</text>
<text x="330" y="132" font-size="11.5" fill="#5C6178" text-anchor="end">13.4 ms</text>
<rect x="30" y="146" width="11" height="11" rx="2" fill="#5C6178"/>
<text x="48" y="156" font-size="11.5" fill="#22263A">Encode + mux</text>
<text x="330" y="156" font-size="11.5" fill="#5C6178" text-anchor="end">4.0 ms</text>
<rect x="360" y="98" width="11" height="11" rx="2" fill="#8A90A8"/>
<text x="378" y="108" font-size="11.5" fill="#22263A">Filters</text>
